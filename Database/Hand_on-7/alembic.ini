; Hands-On 7 : Task 1 (Step 93)
; Alembic configuration file

[alembic]
script_location = .

# path separator; "os" uses os.pathsep, "os" recommended on all platforms
version_path_separator = os

# Set to the SQLAlchemy connection URL for college_db_orm.
# Update this to match your environment (or override via env.py using
# the config values from Hands-On 6's config.py).
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/college_db_orm

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
