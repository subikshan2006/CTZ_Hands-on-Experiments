[pytest]
; Task_*.py files (not just test_*.py) contain pytest tests in this hands-on, since the
; exercise's individual per-step deliverable files are named Task_N.py. This config
; extends pytest's discovery patterns so `pytest -v` at the folder root finds them all.
python_files = Task_*.py test_*.py
python_classes = Test*
python_functions = test_*
